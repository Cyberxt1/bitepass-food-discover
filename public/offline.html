<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f97316" />
    <title>BitePass is offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #241a14;
        background: #fffaf5;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        max-width: 360px;
        text-align: center;
      }
      img {
        width: 88px;
        height: 88px;
        border-radius: 24px;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #73645b;
        line-height: 1.6;
      }
      button {
        margin-top: 24px;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        color: white;
        background: #f97316;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192.png" alt="" />
      <h1>You are offline</h1>
      <p>Reconnect to browse restaurants, place an order, or check its latest status.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
