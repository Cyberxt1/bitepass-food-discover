<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.paystack.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.unsplash.com https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://js.paystack.co https://*.supabase.co wss://*.supabase.co https://nominatim.openstreetmap.org; frame-src https://js.paystack.co https://checkout.paystack.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    />
    <title>BitePass - Preorder. Skip the line. Eat better.</title>
    <meta
      name="description"
      content="Discover nearby restaurants, preorder meals, pay ahead and track live preparation status."
    />
    <meta name="theme-color" content="#f97316" />
    <meta name="application-name" content="BitePass" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BitePass" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/app-icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon-180.png" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <style>
      #bitepass-boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #2b211b;
        background: #fffaf5;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-align: center;
      }
      #bitepass-boot img {
        width: min(300px, 76vw);
        height: auto;
        border-radius: 18px;
      }
      #bitepass-boot p {
        margin: 16px 0 0;
        font-size: 14px;
        font-weight: 750;
      }
      #bitepass-boot span {
        display: block;
        width: 88px;
        height: 4px;
        margin: 14px auto 0;
        overflow: hidden;
        border-radius: 99px;
        background: #f4ded0;
      }
      #bitepass-boot span::after {
        content: "";
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: #f97316;
        animation: bitepass-load 1s ease-in-out infinite alternate;
      }
      @keyframes bitepass-load {
        to {
          transform: translateX(122%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #bitepass-boot span::after {
          animation: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="bitepass-boot" role="status" aria-live="polite">
        <div>
          <img src="/splash-logo.jpg" alt="BitePass" />
          <p>Getting BitePass ready...</p>
          <span aria-hidden="true"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
